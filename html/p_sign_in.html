<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <header>
        <h1>Login</h1>
    </header>
    <main>
        <form action="#" method="get">
            <fieldset>

                <!-- 아이디 -->
                <div>
                    <label for="id">아이디</label>
                    <input type="text" name="id" placeholder="username">
                </div>

                <!-- 비번 -->
                <div>
                    <label for="password">비밀번호</label>
                    <input type="password" name="password" placeholder="password">
                </div>
                
                <!-- 아이디 저장 -->
                 <div>
                    <input type="radio" name="ra1" value="save">
                    <label for="save">Remember username</label>
                    <input type="radio" name="ra1" value="forgot">
                    <label for="radio">Forgot your password?</label>
                 </div>

                 <!-- 로그인 버튼 -->
                  <div>
                    <button type="submit">로그인</button>
                  </div>
            </fieldset>
        </form>
    </main>
    <footer></footer>
</body>
</html>
