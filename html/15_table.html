<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1>Table</h1>
    <table border="1">
        <thead>
            <th>
                <td>품목</td>
                <td>가격</td>
            </th>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>마우스</td>
                <td>1000</td>
            </tr>
            <tr>
                <td>2</td>
                <td>키보드</td>
                <td>2000</td>
            </tr>
            <tr>
                <td>3</td>
                <td>프린터</td>
                <td>3000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">합계</td>
                <td>6000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
