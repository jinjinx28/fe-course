<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입폼</title>
    <meta name="description" content="회원가입 폼을 작성한 예제입니다.">
</head>
<body>
    <h1>회원가입</h1>
    <a href="#field3">기타 항목 입력</a>
    <form action="#" method="GET"> <!-- # = 백엔드 서버 주소 / method : GET/POST -->

         <!-- GET : 서버에 데이터 전송 방식으로 URL을 사용함, Query String(쿼리스트링) 네트웍 패킷의 헤더에 함께 전송 -->
    <!-- POST :  서버에 데이터 전송 시 네트웍 패킷의 바다에 함께 전송 -->
    <fieldset id="field1">
        <legend>개인 정보 입력</legend>
        <ul>
            <li>
                <label for="id">아이디</label>
                <input type="text" name="id" id="id">
            </li>
            <li>
                <label for="password">패스워드</label>
                <input type="password" name="password" id="password">
            </li>
            <li>
                <label for="name">이름</label>
                <input type="text" name="name" id="name">
            </li>

            <!-- <fieldset id="field2">
                <legend>주소 선택 태그</legend> -->
            <li>
                <label for="address1">주소1</label>
                <input type="text" name="address1" id="address1">
            </li>
            <li>
                <label for="address2">주소2</label>
                <input type="radio" name="address2" value="Seoul" id="address2"><span>서울시</span>
                <input type="radio" name="address2" value="Suwon" id="address2"><span>수원시</span>
                <input type="radio" name="address2" value="Incheon" id="address2"><span>인천시</span>
            </li>
            <li>
                <label for="address3">주소3</label>
                <input type="checkbox" name="address3" value="서울" id="address3"><span>서울시</span>
                <input type="checkbox" name="address3" value="수원" id="address3"><span>수원시</span>
                <input type="checkbox" name="address3" value="인천" id="address3"><span>인천시</span>
            </li>
            <li>
                <label for="address4">주소4</label>
                <select name="address4">
                    <option value="선택" id="address4">선택하세요</option>
                    <option value="서울시" id="address4">서울시</option>
                    <option value="수원시" id="address4">수원시</option>
                    <option value="인천시" id="address4">인천시</option>
                </select>
            </li>
            <!-- </fieldset> -->

            <li>
                <label for="birthday">생년월일</label>
                <input type="date" name="birthday" id="birthday">
            </li>
            <li>
                <label for="photo">프로필 사진 업로드</label>
                <input type="file" name="photo" id="photo">
            </li>
            <li>
                <label for="intro">자기소개</label>
                <textarea name="intro" cols="50" rows="10" placeholder="100자 이내로 작성해주세요." id="intro"></textarea>
            </li>
            <li>
                <button type="submit">전송</button> <!-- default : submit -->
                <button type="button">전송 ( 이벤트 x )</button> 
                <button type="reset">다시쓰기</button> 
            </li>
        </ul>
        </fieldset>
        <fieldset id="field3">
            <legend>기타 항목 입력</legend>
        </fieldset>
    </form>
</body>
</html>
