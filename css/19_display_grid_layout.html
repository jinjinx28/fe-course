<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Grid Layout</title>
    <style>
        div{
            border: 1px solid pink;
        }
        .grid-wrap{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 2fr;
            /* grid-template-columns: repeat(4, 1fr); */
            
            grid-template-rows: 100px auto;
            gap: 10px;
            align-items: center; /* 셀기준 세로 정렬 */
            justify-content: center; /* 셀기준 가로 정렬 */
        }
        img[alt="tt1"], img[alt="tt2"] {
            width: 100px; height:100px;
        }
        img[alt="tt3"]{width:500px; height: 300px;}
        .list-grid-wrap {
            border: 1px solid gray;
            display: grid;
            grid-template-columns: 1fr 1fr;
            list-style: none;
        }
        .item-grid{
            border: 1px solid blue;
            grid-column: span 3; /* 컬럼 병합 : 1 ~ 3 */
        }
    </style>
</head>
<body>
    <h1>Display Grid Layout</h1>
    <div class="grid-wrap">
        <div class="item-grid">1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
    </div>
    <!-- 2행 2열 -->
     <ul class="list-grid-wrap">
        <li class="item-grid"><img src="../img/tt.png" alt="tt1"></li>
        <li><img src="../img/tt.png" alt="tt2"></li>
        <li></li><img src="../img/k.jpg" alt="tt3"></li>
        
    </ul>
</body>
</html>
