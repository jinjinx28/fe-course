<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Style</title>
    <style>
        .text{
            text-shadow: 10px 5px 0 rgb(97, 89, 89, 0.5);
        }
        .box{
            width: 500px;
            height: 300px;
            background-color: aquamarine;
            box-shadow: 12px 12px 2px 1px rgb(0 0 255 / 0.2);
        }
    </style>
</head>
<body>
    <h1>Shadow Style</h1>
    <h2 class="text">Text-Shadow</h2>
    <h2 class="box">Box-Shadow</h2>
</body>
</html>
