<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selector</title>
    <meta name="description" content="Universal Selector">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
        :root{
            /* 공통 프로퍼티를 변수로 정의 */
            --color-main : rgb(233, 210, 255);
            --color-font : azure;
        }
        *{
            /* 전체 영역에 공통적인 속성을 정의하는 경우 */
            background-color: var(--color-main);
            font-family: "Open Sans", sans-serif;
            margin: 0;
        }
        h1{
            color: var(--color-font);
            background-color: rgb(186, 113, 255);
        }
        h1, div{
            background-color: blue;
        }
        h3{
            background-color: aquamarine;
        }
        p{
            color: var(--color-font);
            background-color: rgb(137, 200, 255);
        }
    </style>
</head>
<body>
    <h1>Universal(All) Selector</h1>
    <div>
        <h3>Sub Title</h3>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Et, earum aperiam rerum rem modi dignissimos dicta. <br>
            Repudiandae cupiditate nisi consequuntur at quae tempore cumque voluptatibus nemo, ea aliquid dicta sapiente?</p>
    </div>
</body>
</html>
