<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Position</title>
    <style>
        .parent{
            box-sizing: content-box;
            padding: 20px;
            position: relative;
            border: 1px solid blue;
            background-color: rgb(200, 200, 185);
            width: 100%;
        }
        .child{
            position: absolute;
            border: 1px solid pink;
            top: 20px;
            left: 120px;
        }
    </style>
</head>
<body>
    <h1>Logo Position</h1>
    <div class="parent">
        <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="">
        <p class="child">STARBUCKS COFFEE</p>
    </div>
</body>
</html>
