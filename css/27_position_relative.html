<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position-relative</title>
    <style>
        h1, div{
            border: 1px solid blue; 
            position: relative;
        }
        span{
            border: 5px solid pink;
            position: absolute;
            top: 100px;
            left: 200px;
        }
        .p{
            width: 600px;
            height: 300px;
            border: 2px solid lightgreen;
            position: relative;
        }
    </style>
</head>
<body>
    <h1>Position-relative</h1>
    <div>element 1</div>
    <div class="p">
        <span>element 2</span>
    </div>
</body>
</html>
