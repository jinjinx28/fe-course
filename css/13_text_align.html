<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Align</title>
    <meta name="description" content="Text Align">
    <style>
        p { background-color: aquamarine; }
        span { background-color: rgb(204, 164, 242); }
    </style>
</head>
<body>
    <h1>Text Align</h1>
    <h3>block-level</h3>
    <p class="b-left">text align :: left</p>
    <p class="b-right">text align :: right</p>
    <p class="b-center">text align :: center</p>

    <h3>inline-level</h3>
    <span class="i-left">text align :: left</span>
    <span class="i-right">text align :: right</span>
    <span class="i-center">text align :: center</span>
</body>
</html>
