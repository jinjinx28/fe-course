<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index Style</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            color: #fff;
        }
        .red{
            background-color: rgb(255, 127, 138);
            position: relative;
            top: 20px;
            left: 50px;
        }
        .blue{
            background-color: rgb(90, 137, 254);
            position: relative;
            top: -50px;
            left: 100px;
            z-index: 100;
        }
        .green{
            background-color: aquamarine;
            position: relative;
            top: -200px;
            left: 10px;
        }
    </style>
</head>
<body>
    <h1>Z-Index Style</h1>
    <div class="red">Child #1</div>
    <div class="blue">Child #2</div>
    <div class="green">Child #3</div>
</body>
</html>
