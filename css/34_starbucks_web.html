<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks Menu</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Nanum Gothic';
            background-color: rgb(246, 245, 239);
        }
        header {
            /* border: 1px solid red; */
            width: 1000px;
            margin: auto;
            display: flex;  
            justify-content: space-between;          
        }
        .header-menu-top ul, 
        .header-menu-bottom ul {
            display: flex;
            list-style: none;
            /* border: 1px solid blue; */
            justify-content: right;
        }
        .header-menu-top ul { 
            gap: 20px;
            font-size: .9rem;
        }
        .header-menu-bottom ul { gap: 30px; }
        .header-menu-top ul a, 
        .header-menu-bottom ul a {
            text-decoration: none;
            color: #333;
        }
        .header-menu-bottom ul a {
            letter-spacing: .5px;
            font-size: .9rem;
        }
        .header-menu-top li:last-child {
            border: 1px solid gray;
            border-radius: 4px;
            padding: 5px;
            background-color: white;
        }
        .header-menu-top li:last-child i{
            font-size: 1.5rem;
            font-weight: 700;
            background-color: white;
        }
        .header-menu-top li:last-child input{
            display: none;
        }
        .box-image {
            background-color: rgb(250, 216, 222);
            border: 10px solid #fc9ffc;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px; 
        } 

        /* .box-image img {
            width: 150px;
            height: 200px;
            object-fit: contain;
        } */
        .img-d1, .img-d2, .img-d3, .img-d4, .img-d5{
            width: 150px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box-image img{
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

    </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="Logo">
        </div>
        <div class="header-menu">
            <nav class="header-menu-top">
                <ul>
                    <li><a href="#">Sign In</a></li>
                    <li><a href="#">My Starbucks</a></li>
                    <li><a href="#">Customer Service & Ideas</a></li>
                    <li><a href="#">Find a Store</a></li>
                    <li>
                        <input type="text">
                        <a href="#"><i class="fa-brands fa-sistrix"></i></a>
                    </li>
                </ul>
            </nav>
            <nav class="header-menu-bottom">
                <ul>
                    <li><a href="#">COFFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS REWARDS</a></li>
                    <li><a href="#">CORPORATE SALES</a></li>
                    <li><a href="#">WHAT'S NEW</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="box-image">
        <div class="img-d1">
            <img class="i1" src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png" alt="슈크림라뗴">
        </div>
        <div class="img-d2">
            <img class="i2" src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_mo_260220.png" alt="슈크림폼라떼">
        </div>
        <div class="img-d3">
            <img class="i3" src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png" alt="슈크림말차라떼">
        </div>
        <div class="img-d4">
            <img class="i4" src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_mo_260220.png" alt="슈크림딸기라떼">
        </div>
        <div class="img-d5">
            <img class="i5" src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png" alt="체리블라썸백도크림프라푸치노">
        </div>
    </div>
</body>
</html>
