<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin-auto</title>
    <style>
        h1{
            width: 50%;
            height: 200px;
            background-color: pink;
            margin: auto;
        }
        div{
            width: 80%;
            height: 500px;
            background-color: aquamarine;
        }
        p{
            width: 800px;
            background-color: white;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>Margin-auto</h1>
    <div>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sit, 
            itaque sunt facere id atque numquam laboriosam iste autem aspernatur voluptates molestiae 
            est assumenda voluptas animi earum, architecto omnis quis iure!</p>
    </div>
</body>
</html>
