<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="description" content="CSS 사용법을 익히는 예제입니다.">
    <style>
        h2{color: rgb(122, 255, 89);}
        span{color: blueviolet;}
    </style>
    <link rel="stylesheet" href="external.css"> <!-- css 링크는 꼭head 안에다가 -->
</head>
<body>
    <!-- 
     1. inline : HTML Element에 직잡 CSS style attribute ( 속성 ) 추가 
     2. internal : HTML <head> Element에 <style> Element 추가 - selector 사용
     3. external : style 속성의 별도의 /css 파일에 저장하고 필요시 <link>로 호출 
        -->

    <h1 style="color: aqua;">CSS 사용법</h1>
    <h2><span>1.</span> inline</h2>
    <h2><span>2.</span> internal</h2>
    <h2><span>3.</span> external</h2>
</body>
</html>
