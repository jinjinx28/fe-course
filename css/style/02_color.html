<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS- Color</title>
    <meta name="description" content="CSS-Color">
    <style>
        h2{color: blue;}
        h3{color: rgb(225, 212, 232);}
        h4{color: rgba(30, 57, 50, 1);} /* 투명도는 0 ~ 1 */
        h5{color: #bd32bd;}
    </style>
</head>
<body>
    <h1>CSS-Colors</h1>
    <h2>Color - name</h2>
    <h3>Color - rgb</h3>
    <h4>Color - rgba</h4>
    <h5>Color - hexa</h5>
</body>
</html>
