<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Style</title>
    <meta name="description" content="List">
    <style>
        ul{
            background-color: aquamarine;
            list-style-type: none;
            padding: 0;
        }
        ol{
            background-color: pink;
            list-style-type: '🌐';
            padding: 1;
        }
        li{
            background-color: rgb(155, 155, 255);
        }
        h3{border: 1px solid black;}
    </style>
</head>
<body>
    <h1>List Style</h1>
    <ul>
        <h3>Front End</h3>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    <ol>
        <h3>Back End</h3>
        <li>JSP</li>
        <li>ASP</li>
        <li>NodeJS</li>
    </ol>
</body>
</html>
